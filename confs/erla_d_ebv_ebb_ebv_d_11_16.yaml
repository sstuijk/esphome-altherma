  register: 0x10
  offset: 1
  convid: 304
  datasize: 1
- <<: *binary
  name: Thermostat ON/OFF
  register: 0x60
  offset: 2
  convid: 303
  datasize: 1
- <<: *binary
  name: Water flow switch
  register: 0x60
  offset: 11
  convid: 307
  datasize: 1
- <<: *binary
  name: Thermal protector (Q1L) BUH
  register: 0x60
  offset: 11
  convid: 306
  datasize: 1
- <<: *binary
  name: Thermal protector BSH
  register: 0x60
  offset: 11
  convid: 305
  datasize: 1
- <<: *binary
  name: 2way valve(On:Heat_Off:Cool)
  register: 0x60
  offset: 12
  convid: 307
  datasize: 1
- <<: *binary
  name: 3way valve(On:DHW_Off:Space)
  register: 0x60
  offset: 12
  convid: 306
  datasize: 1
- <<: *binary
  name: BSH
  register: 0x60
  offset: 12
  convid: 305
  datasize: 1
- <<: *binary
  name: BUH Step1
  register: 0x60
  offset: 12
  convid: 304
  datasize: 1
- <<: *binary
  name: BUH Step2
  register: 0x60
  offset: 12
  convid: 303
  datasize: 1
- <<: *binary
  name: Water pump operation
  register: 0x60
  offset: 12
  convid: 301
  datasize: 1
- <<: *binary
  name: Reheat ON/OFF
  register: 0x62
  offset: 2
  convid: 307
  datasize: 1
- <<: *binary
  name: Circulation pump operation
  register: 0x62
  offset: 8
  convid: 302
  datasize: 1

text_sensor:
- <<: *text
  name: Operation Mode
  register: 0x10
  offset: 0
  convid: 217
  datasize: 1
- <<: *text
  name: I/U operation mode
  register: 0x60
  offset: 2
  convid: 315
  datasize: 1

